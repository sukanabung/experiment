<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Todo List Teavou</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-view">
        <h1 class="main-title">📝 Todo List Teavou</h1>

        <div class="card-box">
            <h2 id="auth-title">Login Aplikasi</h2>
            <p id="auth-error" class="error-msg"></p>

            <div id="login-form">
                <input type="email" id="email" name="email" placeholder="Email Address" autocomplete="off">
                <input type="password" id="password" name="password" placeholder="Password" autocomplete="off">

                <button type="button" onclick="handleLogin()" class="btn-primary" id="auth-btn">Masuk</button>
            </div>
            <button type="button" onclick="goToRegister()" class="auth-link" id="toggle-link">Belum punya akun? Daftar</button>
        </div>
    </div>

    <script>
        // Use relative API route so nginx proxy forwards requests to auth-service.
        const AUTH_API = '/api/auth';

        async function handleLogin() {
            const identifier = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!identifier || !password) {
                document.getElementById('auth-error').innerText = 'Email dan password wajib diisi';
                return;
            }

            try {
                const res = await fetch(AUTH_API + '/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ username: identifier, password })
                });

                let data;
                try {
                    data = await res.json();
                } catch (parseErr) {
                    throw new Error('Server returned non-JSON response');
                }

                if (!res.ok) {
                    const msg = data && (data.message || data.error) ? (data.message || data.error) : 'Login failed';
                    throw new Error(msg);
                }

                const tokenValue = data.token || data.accessToken || data.authToken;
                if (!tokenValue) throw new Error('No token returned from server');

                localStorage.setItem('token', tokenValue);
                const username = (data.user && data.user.username) || data.username || '';
                if (username) localStorage.setItem('username', username);

                // small visual confirmation before redirect for debugging
                // (will immediately redirect in normal flow)
                window.location.href = 'home.html';
            } catch (err) {
                console.error('Login error:', err);
                document.getElementById('auth-error').innerText = err.message || 'Login gagal';
            }
        }

        function goToRegister() {
            window.location.href = 'register.html';
        }
    </script>
</body>
</html>

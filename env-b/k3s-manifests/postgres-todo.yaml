apiVersion: v1
kind: Service
metadata:
  name: postgres-todo
  namespace: todo-research
spec:
  selector:
    app: postgres-todo
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-todo
  namespace: todo-research
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-todo
  template:
    metadata:
      labels:
        app: postgres-todo
    spec:
      containers:
        - name: postgres-todo
          image: postgres:15-alpine
          env:
            - name: POSTGRES_USER
              value: "todouser"
            - name: POSTGRES_PASSWORD
              value: "todopass"
            - name: POSTGRES_DB
              value: "tododb"
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-todo-storage
              mountPath: /var/lib/postgresql/data
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: postgres-todo-storage
          persistentVolumeClaim:
            claimName: postgres-todo-pvc
        - name: init-script
          configMap:
            name: todo-init-sql
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-service
  namespace: todo-research
  labels:
    app: todo-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-service
  template:
    metadata:
      labels:
        app: todo-service
    spec:
      containers:
        - name: todo-service
          image: todo-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: DATABASE_HOST
              value: "postgres-todo"
            - name: DATABASE_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: "todouser"
            - name: POSTGRES_PASSWORD
              value: "todopass"
            - name: POSTGRES_DB
              value: "tododb"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:3000"
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
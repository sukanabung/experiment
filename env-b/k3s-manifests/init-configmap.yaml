---
apiVersion: v1
kind: ConfigMap
metadata:
  name: todo-init-sql
  namespace: todo-research
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS todos (
      id SERIAL PRIMARY KEY,
      user_id INTEGER NOT NULL,
      title VARCHAR(255) NOT NULL,
      description TEXT,
      due_date DATE,
      completed BOOLEAN DEFAULT FALSE,
      priority INTEGER DEFAULT 1,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      completed_at TIMESTAMP
    );
    CREATE INDEX idx_todos_user_id ON todos(user_id);
    CREATE INDEX idx_todos_completed ON todos(completed);
    CREATE INDEX idx_todos_due_date ON todos(due_date);
    CREATE INDEX idx_todos_user_completed ON todos(user_id, completed);
    INSERT INTO todos (user_id, title, description, due_date, priority) VALUES
    (1, 'Belajar Kubernetes di Windows', 'Mempelajari K3s dengan K3d di Windows Native', '2024-12-31', 2),
    (1, 'Setup Environment B', 'Menyiapkan lingkungan Kubernetes untuk penelitian', '2024-12-28', 1),
    (2, 'Testing HPA', 'Menguji Horizontal Pod Autoscaler', '2024-12-29', 2),
    (3, 'Update Manifests', 'Memperbarui Kubernetes manifests', '2024-12-30', 3),
    (4, 'Load Testing K8s', 'Menjalankan JMeter load testing di Kubernetes', '2024-12-27', 1)
    ON CONFLICT DO NOTHING;